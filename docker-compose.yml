version: '3.8'

services:
  payment-service:
    build:
      context: ./sample-payment-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENABLE_BAD_CONFIG=false
      - K_SERVICE=sample-payment-service
      - K_REVISION=sample-payment-service-v14
      - GCP_REGION=us-central1
    networks:
      - sre-network

  sre-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - PORT=8080
      - DEMO_MODE=true
      - GEMINI_MODEL=gemini-3.5-flash
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      # If using Vertex AI locally, pass credentials:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials.json
    volumes:
      # Optional: Mount credentials if needed
      - ~/.config/gcloud/application_default_credentials.json:/app/credentials.json:ro
    depends_on:
      - payment-service
    networks:
      - sre-network

networks:
  sre-network:
    driver: bridge
